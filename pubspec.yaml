name: mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  provider: ^6.1.2  # Simple MVC state management (ChangeNotifier)
  http: ^1.2.2      # HTTP client for API calls
  shared_preferences: ^2.2.3
  mobile_scanner: ^5.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.2.2
  image_cropper: ^12.2.1
  http_parser: ^4.1.2
  flutter_launcher_icons: ^0.14.3
  path_provider: ^2.1.2
  open_filex: ^4.7.0
  

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.5

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/docs/

  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito-Regular.ttf
        - asset: assets/fonts/Nunito-Bold.ttf
          weight: 700

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/itrac-app-icon.png"

flutter_native_splash:
  color: "#000000"          
  image: "assets/images/itrac-app-icon.png"
  fullscreen: true

  android_12:
    image: "assets/images/itrac-android12-splash.png"
    color: "#000000"
